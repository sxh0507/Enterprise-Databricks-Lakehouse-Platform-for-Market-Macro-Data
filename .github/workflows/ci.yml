name: CI Pipeline

on:
  push:
    branches: [ "main", "week*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Project as Package
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      # Ruff checks src/ and tests/ only -- Notebooks excluded to avoid %sql magic syntax errors
      - name: Run Ruff Linter (src & tests only)
        run: |
          python3 -m ruff check src/ tests/
          python3 -m ruff format --check src/ tests/

      # Tests marked @pytest.mark.spark require PySpark/Java and run on Databricks, not in CI.
      # To run spark tests locally: pip install -e ".[spark]" && pytest -m spark
      - name: Run Pure-Python Unit Tests
        env:
          PYTHONPATH: src
        run: |
          python3 -m pytest tests/unit/ -v -m "not spark"
