name: CI Pipeline

on:
  push:
    branches: [ "main", "week*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Code Quality & PySpark Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install OpenJDK (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Project as Package
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      # Ruff checks src/ and tests/ only -- Notebooks excluded to avoid %sql magic syntax errors
      - name: Run Ruff Linter (src & tests only)
        run: |
          python3 -m ruff check src/ tests/
          python3 -m ruff format --check src/ tests/

      - name: Run Pytest Unit Tests
        env:
          PYTHONPATH: src
          # setup-java exports JAVA_HOME to $GITHUB_ENV; forward it explicitly so PySpark JVM starts
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3
          PYSPARK_SUBMIT_ARGS: "--master local[1] pyspark-shell"
        run: |
          java -version
          python3 -m pytest tests/unit/ -v
