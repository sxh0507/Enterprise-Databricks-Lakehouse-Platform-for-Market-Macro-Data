bundle:
  name: enterprise-market-macro-lakehouse

workspace:
  root_path: /Workspace/Users/xh.shi0507@gmail.com/.bundle/${bundle.name}

resources:
  jobs:
    market_macro_pipeline:
      name: market_macro_pipeline

      tasks:
        - task_key: setup_catalog
          notebook_task:
            notebook_path: 00_setup_catalog_schema.sql.ipynb

        - task_key: bronze_crypto
          depends_on:
            - task_key: setup_catalog
          notebook_task:
            notebook_path: 10_bronze_ingest_crypto.py.ipynb

        - task_key: bronze_ecb
          depends_on:
            - task_key: bronze_crypto
          notebook_task:
            notebook_path: 11_bronze_ingest_ecb_fx.ipynb

        - task_key: bronze_fred
          depends_on:
            - task_key: bronze_ecb
          notebook_task:
            notebook_path: 12_bronze_ingest_fred.py.ipynb

        - task_key: silver_crypto
          depends_on:
            - task_key: bronze_fred
          notebook_task:
            notebook_path: 20_silver_crypto_ohlc_parse.py.ipynb

        - task_key: silver_ref
          depends_on:
            - task_key: silver_crypto
          notebook_task:
            notebook_path: 22_silver_ref_parse.py.ipynb

        - task_key: gold_features
          depends_on:
            - task_key: silver_ref
          notebook_task:
            notebook_path: 30_gold_ohlc_features.sql.ipynb

        # 你的 33 是纯 .sql 文件，DAB 这里仍然可以当 notebook 文件部署，
        # 但如果 deploy/run 时提示不是 notebook，我们再改成用一个 python wrapper 来执行 SQL（我后面给你）
        - task_key: gold_market_macro
          depends_on:
            - task_key: gold_features
          notebook_task:
            notebook_path: 330_gold_market_macro_daily.ipynb

        - task_key: observability
          depends_on:
            - task_key: gold_market_macro
          notebook_task:
            notebook_path: 40_observability_metrics.py.ipynb